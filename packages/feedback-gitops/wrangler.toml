name = "feedback-gitops"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# No custom routes - worker is accessible at feedback-gitops.YOUR_ACCOUNT.workers.dev
# GET /widget.js - Public endpoint for loading the widget
# POST /api/issue - Called via Service Binding from thoughts Pages Function
#                    (can also be called directly with proper CORS)

[[queues.producers]]
queue = "feedback-queue"
binding = "FEEDBACK_QUEUE"

[[queues.consumers]]
queue = "feedback-queue"
max_batch_size = 10
max_batch_timeout = 30
